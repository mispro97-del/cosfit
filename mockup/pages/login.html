<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>COSFIT — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    body { background: var(--gradient-hero); }
    .login-hero-text {
      position: relative; z-index: 2;
      text-align: center; color: white;
    }
    .login-hero-logo {
      font-size: 48px; font-weight: 900;
      letter-spacing: -0.03em; line-height: 1;
      margin-bottom: 8px;
    }
    .login-hero-sub {
      font-size: 15px; font-weight: 400;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.02em;
    }
    .login-steps {
      margin-top: 24px;
      display: flex; flex-direction: column; gap: 10px;
      text-align: left;
    }
    .login-step {
      display: flex; align-items: center; gap: 12px;
      font-size: 13px; color: rgba(255,255,255,0.75);
    }
    .login-step-num {
      font-size: 10px; font-weight: 900;
      color: rgba(255,255,255,0.35);
      width: 20px; flex-shrink: 0;
    }
    .success-banner {
      padding: 12px 16px;
      background: var(--success-bg);
      border: 1px solid rgba(107,158,125,0.3);
      border-radius: 12px;
      font-size: 13px;
      color: var(--success);
      text-align: center;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .social-row { display: flex; flex-direction: column; gap: 10px; }
    .signup-link {
      text-align: center; font-size: 13px;
      color: var(--text-secondary); margin-top: 24px;
    }
    .signup-link a { color: var(--brand); font-weight: 700; text-decoration: none; }
    .signup-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="phone-frame" style="background: var(--gradient-hero);">

  <!-- Hero Area -->
  <div class="login-hero">
    <div class="login-hero-bubble" style="width:280px;height:280px;top:-100px;right:-80px;"></div>
    <div class="login-hero-bubble" style="width:200px;height:200px;bottom:-60px;left:-60px;opacity:0.05;"></div>
    <div class="login-hero-text animate-fade-in-up">
      <div class="login-hero-logo">COSFIT</div>
      <div class="login-hero-sub">내 피부를 위한 뷰티 AI</div>
      <div class="login-steps">
        <div class="login-step">
          <span class="login-step-num">01</span>
          <span>인생템으로 나만의 피부 기준 생성</span>
        </div>
        <div class="login-step">
          <span class="login-step-num">02</span>
          <span>AI가 성분을 분석해 FIT Score 산출</span>
        </div>
        <div class="login-step">
          <span class="login-step-num">03</span>
          <span>내 피부에 딱 맞는 화장품 추천</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Form Card -->
  <div class="login-form-card animate-slide-up">

    <!-- Success banner (conditional) -->
    <!-- <div class="success-banner">회원가입 완료! 로그인해 주세요.</div> -->

    <!-- Type tabs -->
    <div class="login-tabs" style="margin-bottom:24px;">
      <button class="login-tab active" onclick="setTab(this)">일반</button>
      <button class="login-tab" onclick="setTab(this)">파트너</button>
      <button class="login-tab" onclick="setTab(this)">어드민</button>
    </div>

    <!-- Form -->
    <form onsubmit="return false;">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input class="input" type="email" placeholder="이메일을 입력하세요" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="input" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
      </div>

      <!-- Error state (shown when login fails) -->
      <div id="error-msg" style="display:none; padding:12px 16px; background:var(--error-bg); border:1px solid rgba(196,112,112,0.3); border-radius:12px; font-size:12px; color:var(--error); text-align:center; margin-bottom:16px;">
        이메일 또는 비밀번호가 올바르지 않습니다.
      </div>

      <button type="submit" class="btn-primary" onclick="simulateLogin(this)">로그인</button>
    </form>

    <!-- Social login -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">또는 소셜 로그인</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-row">
      <button class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.20C17.64 8.57 17.58 7.95 17.48 7.36H9V10.85H13.84C13.64 11.97 13.00 12.92 12.05 13.56V15.82H14.96C16.66 14.25 17.64 11.95 17.64 9.20Z" fill="#4285F4"/>
          <path d="M9 18C11.43 18 13.47 17.19 14.96 15.82L12.05 13.56C11.24 14.10 10.21 14.42 9 14.42C6.66 14.42 4.67 12.84 3.96 10.71H0.96V13.04C2.44 15.98 5.48 18 9 18Z" fill="#34A853"/>
          <path d="M3.96 10.71C3.78 10.17 3.68 9.59 3.68 9C3.68 8.41 3.78 7.83 3.96 7.29V4.96H0.96C0.35 6.17 0 7.55 0 9C0 10.45 0.35 11.83 0.96 13.04L3.96 10.71Z" fill="#FBBC05"/>
          <path d="M9 3.58C10.32 3.58 11.51 4.03 12.44 4.93L15.02 2.34C13.46 0.89 11.43 0 9 0C5.48 0 2.44 2.02 0.96 4.96L3.96 7.29C4.67 5.16 6.66 3.58 9 3.58Z" fill="#EA4335"/>
        </svg>
        Google로 계속하기
      </button>
      <button class="btn-kakao">
        <svg width="18" height="17" viewBox="0 0 18 17" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M9 0C4.03 0 0 3.13 0 6.99C0 9.39 1.52 11.51 3.83 12.77L2.93 16.24C2.86 16.52 3.18 16.74 3.42 16.58L7.42 13.92C7.94 13.99 8.47 14.02 9 14.02C13.97 14.02 18 10.89 18 7.03C18 3.17 13.97 0 9 0Z" fill="#191919"/>
        </svg>
        카카오로 계속하기
      </button>
    </div>

    <p class="signup-link">
      계정이 없으신가요? <a href="#">회원가입</a>
    </p>
  </div>
</div>

<script>
function setTab(el) {
  document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
function simulateLogin(btn) {
  btn.textContent = '로그인 중...';
  btn.disabled = true;
  setTimeout(() => {
    btn.textContent = '로그인';
    btn.disabled = false;
    document.getElementById('error-msg').style.display = 'block';
  }, 1500);
}
</script>
</body>
</html>
