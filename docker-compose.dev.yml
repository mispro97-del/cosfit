version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: cosfit-db-local
    environment:
      POSTGRES_DB: cosfit
      POSTGRES_USER: cosfit
      POSTGRES_PASSWORD: cosfit_local_dev
    ports:
      - "5432:5432"
    volumes:
      - cosfit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosfit -d cosfit"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  cosfit_pg_data:
